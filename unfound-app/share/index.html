<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>UNFOUND｜みんなの推し活掲示板</title>
<meta name="description" content="UNFOUNDは「みんなの推し活掲示板」アプリ。お気に入りの推しにハイタッチで応援、ファン同士で掲示板でつながる。">

<!-- Smart App Banner（iOS）— app-argument が JS でセットされる -->
<meta name="apple-itunes-app" id="smartbanner" content="app-id=6771274868">

<link rel="canonical" href="https://plan8.jp/unfound-app/share/">
<meta property="og:title" content="UNFOUND｜みんなの推し活掲示板">
<meta property="og:description" content="お気に入りの推しにハイタッチで応援。ファンの掲示板でつながる。">
<meta property="og:type" content="website">
<meta property="og:url" content="https://plan8.jp/unfound-app/share/">
<meta property="og:image" content="https://plan8.jp/unfound-app/oshipi-logo.png">
<meta property="og:site_name" content="UNFOUND">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="UNFOUND｜みんなの推し活掲示板">
<meta name="twitter:image" content="https://plan8.jp/unfound-app/oshipi-logo.png">

<link rel="icon" href="/favicon.ico">
<link rel="apple-touch-icon" sizes="192x192" href="/assets/favicon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=M+PLUS+1p:wght@400;500;700;900&display=swap">

<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'M PLUS 1p',"Hiragino Sans","Yu Gothic",system-ui,sans-serif;
    background:#fff; color:#111; min-height:100vh;
    -webkit-font-smoothing:antialiased; font-feature-settings:"palt";
    line-height:1.7;
  }
  .wrap{max-width:520px;margin:0 auto;padding:48px 24px 96px;text-align:center}
  .logo{width:140px;height:140px;margin:0 auto 24px;display:block}
  h1{font-size:28px;font-weight:900;margin-bottom:8px;letter-spacing:0.02em}
  .tagline{color:#555;font-size:14px;margin-bottom:8px}
  .inviter{
    display:inline-block;padding:6px 14px;border-radius:999px;
    background:#FFE9F2;color:#FF3D8B;font-size:13px;font-weight:700;
    margin:8px 0 28px;
  }
  .cta{
    display:flex;align-items:center;justify-content:center;gap:8px;
    background:#000;color:#fff;text-decoration:none;
    padding:16px 24px;border-radius:14px;font-weight:700;
    margin:24px auto 12px;
  }
  .cta:hover{opacity:.85}
  .cta svg{width:20px;height:20px}
  .features{margin:40px 0 0;text-align:left;display:grid;gap:14px}
  .feature{
    display:flex;gap:12px;align-items:flex-start;
    padding:14px;border:1px solid #eee;border-radius:12px;
  }
  .feature .ic{font-size:24px;line-height:1}
  .feature .title{font-weight:700;font-size:14px;margin-bottom:2px}
  .feature .desc{color:#666;font-size:12px;line-height:1.6}
  footer{margin-top:48px;color:#999;font-size:11px}
  footer a{color:#777;text-decoration:none}
  footer a:hover{color:#111}
</style>
</head>
<body>

<div class="wrap">
  <img class="logo" src="/unfound-app/oshipi-logo.png" alt="UNFOUND ロゴ">
  <h1>UNFOUND</h1>
  <div class="tagline">推しを応援する、毎日の場所。</div>
  <div class="inviter" id="inviter" style="display:none">あなたへの招待が届いています</div>

  <a class="cta" id="cta" href="https://apps.apple.com/jp/app/unfound-app/id6771274868">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.5 12.5c0-2.6 2.1-3.8 2.2-3.9-1.2-1.7-3-2-3.7-2-1.6-.2-3.1.9-3.9.9-.8 0-2-.9-3.3-.9-1.7 0-3.3 1-4.2 2.5-1.8 3.1-.5 7.7 1.3 10.2.9 1.2 1.9 2.6 3.3 2.6 1.3 0 1.8-.9 3.4-.9 1.6 0 2.1.9 3.4.9 1.4 0 2.3-1.3 3.2-2.5 1-1.5 1.4-2.9 1.4-3-.1 0-2.7-1-2.7-3.9zm-2.6-7.2c.7-.9 1.2-2.1 1.1-3.3-1 0-2.3.7-3 1.5-.6.8-1.2 2-1.1 3.2 1.2.1 2.3-.6 3-1.4z"/></svg>
    <span id="ctaLabel">アプリでひらく</span>
  </a>
  <div style="color:#999;font-size:11px;margin-top:8px">未インストールの場合は App Store へ ・ 無料 / iOS 13+</div>

  <div class="features">
    <div class="feature">
      <div class="ic">🙌🏻</div>
      <div>
        <div class="title">ハイタッチで毎日応援</div>
        <div class="desc">推しのアバターをタップして応援。日々の積み上げがランキングに反映。</div>
      </div>
    </div>
    <div class="feature">
      <div class="ic">💬</div>
      <div>
        <div class="title">推し事掲示板でファン同士交流</div>
        <div class="desc">スレッドを立てて意見交換。コメントには #ID が振られ「>>3」で返信ジャンプ。</div>
      </div>
    </div>
    <div class="feature">
      <div class="ic">🏆</div>
      <div>
        <div class="title">ランキング & 急上昇</div>
        <div class="desc">ファン数・ハイタッチ数で総合ランキング、急上昇枠も。</div>
      </div>
    </div>
  </div>

  <footer>
    &copy; 2026 株式会社 plan8 ・
    <a href="/unfound-app/privacy.html">プライバシー</a> ・
    <a href="/unfound-app/terms.html">利用規約</a> ・
    <a href="/unfound-app/">UNFOUND トップ</a>
  </footer>
</div>

<script>
  // ?o=<oshi_id>&ref=<user_id> を読み取り、各種リンクを更新
  (function () {
    var qs = new URLSearchParams(location.search);
    var oshi = qs.get('o') || '';
    var ref = qs.get('ref') || '';
    var ua = navigator.userAgent || '';

    // Smart App Banner の app-argument（既インストールならアプリ起動時にこの URL が渡る）
    var arg = 'oshipi://share?' + (oshi ? 'o=' + encodeURIComponent(oshi) + '&' : '') + 'ref=' + encodeURIComponent(ref);
    var banner = document.getElementById('smartbanner');
    if (banner && ref) banner.setAttribute('content', 'app-id=6771274868, app-argument=' + arg);

    // 招待者がいる場合のバッジ表示
    if (ref) document.getElementById('inviter').style.display = 'inline-block';

    var appStoreUrl = 'https://apps.apple.com/jp/app/unfound-app/id6771274868';
    // 既インストール端末を deep link でアプリ起動するための URL スキーム
    var schemeUrl = 'oshipi://share?' +
      (oshi ? 'o=' + encodeURIComponent(oshi) + '&' : '') +
      (ref ? 'ref=' + encodeURIComponent(ref) : '');

    // SNS / メッセンジャー等の内部ブラウザ判定（カスタムスキームをブロックする）
    // UA はバージョンアップで変わるため、複数の signal を OR で判定する：
    // ①UA に SNS 名 ②document.referrer が SNS 由来 ③モバイル端末
    // 誤検知側に倒しても害が無い案内なので積極的に出す。
    var inAppRe = /(Twitter|TwitterAndroid|Instagram|FBAN|FBAV|Line\/|TikTok|musically|KAKAOTALK)/i;
    var refRe = /(twitter\.com|x\.com|t\.co|instagram\.com|facebook\.com|fb\.me|line\.me|tiktok\.com)/i;
    var isMobile = /iPhone|iPad|iPod|Android/i.test(ua);
    var isIOS = /iPhone|iPad|iPod/i.test(ua);
    var isInApp = inAppRe.test(ua) || refRe.test(document.referrer || '');
    var debugForce = new URLSearchParams(location.search).get('debug') === '1';

    // モバイル端末ならほぼ確実に SNS 経由（インストール導線）なので注意文を常に出す。
    // 誤検知の害は案内を読むだけで実害ゼロ。
    // デスクトップ（PC/Mac）は内部ブラウザ問題と無関係なので一切配慮不要。
    if (isMobile || debugForce) {
      // SNS 内部ブラウザを検知した場合のみ：
      // 🍎「アプリでひらく」CTA は別途 attribution 用にクリップボードへ書き込むため、
      // URL コピーと併用するとクリップボードが上書きされる。
      // 内部ブラウザでは元 CTA を隠し URL コピー一本に絞る（外部ブラウザに遷移後 isInApp=false になって本来の CTA が再表示）。
      if (isInApp || debugForce) {
        var origCta = document.getElementById('cta');
        if (origCta) origCta.style.display = 'none';
        var ctaSub = origCta && origCta.nextElementSibling;
        if (ctaSub) ctaSub.style.display = 'none';
      }

      var notice = document.createElement('div');
      notice.style.cssText = 'margin:24px auto 0;padding:18px;background:#FFF3CD;border:1px solid #FFE69C;border-radius:12px;color:#664D03;font-size:13px;text-align:left;line-height:1.7;max-width:480px';
      notice.innerHTML =
        '<strong>⚠️ アプリで開けない場合：</strong><br>' +
        'X や Instagram など SNS のアプリ内ブラウザではアプリを起動できません。<br>' +
        '<ol style="margin:10px 0 0 1.2em;padding:0;font-size:13px">' +
          '<li>下のボタンで<strong>このページの URL をコピー</strong></li>' +
          '<li>Safari や Chrome などの<strong>外部ブラウザを開く</strong></li>' +
          '<li>アドレス欄に<strong>貼り付けてアクセス</strong></li>' +
          '<li>「アプリでひらく」をタップ</li>' +
        '</ol>' +
        '<div style="margin-top:14px">' +
          '<button id="copyUrl" type="button" style="' +
            'width:100%;background:#000;color:#fff;border:none;border-radius:10px;' +
            'padding:14px 16px;font-size:14px;font-weight:700;cursor:pointer;' +
            'display:flex;align-items:center;justify-content:center;gap:8px;' +
            'font-family:inherit">' +
            '📋 URL をコピーする' +
          '</button>' +
          '<div id="copiedHint" style="display:none;margin-top:10px;color:#155724;font-weight:700;font-size:12px;text-align:center;line-height:1.6">' +
            '✓ URL をコピーしました<br>外部ブラウザのアドレス欄に貼り付けてください' +
          '</div>' +
        '</div>';
      var ctaEl = document.getElementById('cta');
      if (ctaEl && ctaEl.parentNode) ctaEl.parentNode.insertBefore(notice, ctaEl);

      // URL コピー：iOS WebView でも document.execCommand フォールバックで動く
      var copyBtn = document.getElementById('copyUrl');
      if (copyBtn) {
        copyBtn.addEventListener('click', async function () {
          var fullUrl = location.href;
          var copied = false;
          try {
            if (navigator.clipboard && navigator.clipboard.writeText) {
              await navigator.clipboard.writeText(fullUrl);
              copied = true;
            } else {
              var ta = document.createElement('textarea');
              ta.value = fullUrl;
              ta.style.position = 'fixed';
              ta.style.opacity = '0';
              document.body.appendChild(ta);
              ta.select();
              copied = document.execCommand && document.execCommand('copy');
              document.body.removeChild(ta);
            }
          } catch (_) { /* ignore */ }

          if (copied) {
            document.getElementById('copiedHint').style.display = 'block';
            copyBtn.textContent = '✓ コピー済み';
            copyBtn.style.background = '#155724';
          } else {
            copyBtn.textContent = '⚠️ コピーできませんでした';
            copyBtn.style.background = '#dc3545';
          }
        });
      }
    }

    // 診断用：?debug=1 を付けて開くと UA と referrer を表示
    if (debugForce) {
      var dbg = document.createElement('pre');
      dbg.style.cssText = 'margin:16px auto 0;padding:10px;background:#f4f4f4;color:#333;font-size:10px;text-align:left;max-width:480px;white-space:pre-wrap;word-break:break-all;border-radius:8px';
      dbg.textContent = 'UA: ' + ua + '\nReferrer: ' + (document.referrer || '(empty)') + '\nisInApp: ' + isInApp + '\nisMobile: ' + isMobile;
      document.querySelector('.wrap').appendChild(dbg);
    }

    // CTA タップ：①clipboard へ ref 書き込み（新規 DL attribution 用）
    //           ②URL スキーム試行 → ③1.5 秒後に App Store フォールバック
    var cta = document.getElementById('cta');
    if (cta) {
      cta.setAttribute('href', appStoreUrl); // 念のため
      cta.addEventListener('click', function (e) {
        // クリップボードに ref を残す（インストール後の最初の起動で拾う）
        if (ref && navigator.clipboard) {
          var payload = 'oshipi-ref:' + ref + (oshi ? ':' + oshi : '');
          navigator.clipboard.writeText(payload).catch(function () {});
        }
        // 既インストール検出のため通常 href は止めて手動制御
        e.preventDefault();
        var jumped = false;
        var visHandler = function () {
          if (document.hidden) {
            jumped = true; // アプリ起動成功（タブが非表示になった）
          }
        };
        document.addEventListener('visibilitychange', visHandler);
        // アプリ起動試行
        try {
          window.location.href = schemeUrl;
        } catch (_) {}
        // 1.5 秒経ってもアプリが立ち上がらなければ App Store へ
        setTimeout(function () {
          document.removeEventListener('visibilitychange', visHandler);
          if (!jumped && !document.hidden) {
            window.location.href = appStoreUrl;
          }
        }, 1500);
      });
    }

    // ref が無い場合（招待リンクではない単独閲覧）は普通に App Store 直行
    if (!ref) {
      var label = document.getElementById('ctaLabel');
      if (label) label.textContent = 'App Store でひらく';
    }
  })();
</script>
</body>
</html>
