<!DOCTYPE html>
<html lang="ja" data-lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>santaku を開く / Open santaku</title>
<style>
  :root { --fg:#111; --sub:#666; --accent:#E85A5A; --green:#5AB88F; }
  body { margin:0; font-family:-apple-system,"Hiragino Sans","Noto Sans JP",sans-serif; color:var(--fg);
         min-height:100vh; display:flex; align-items:center; justify-content:center; background:#fff; }
  .card { text-align:center; padding:40px 24px; max-width:380px; }
  .logo { width:84px; height:84px; border-radius:20px; margin:0 auto 20px; display:flex; align-items:center; justify-content:center; gap:5px; box-shadow:0 8px 24px rgba(0,0,0,.08); }
  .pill { width:46px; height:11px; border-radius:6px; }
  h1 { font-size:22px; margin:0 0 6px; }
  p { color:var(--sub); font-size:15px; }
  .btn { display:inline-block; margin-top:18px; background:var(--fg); color:#fff; text-decoration:none;
         padding:12px 22px; border-radius:999px; font-weight:700; font-size:15px; }
  .en { display:none; } html[data-lang="en"] .ja { display:none; } html[data-lang="en"] .en { display:block; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="pill" style="background:#5AB88F"></div>
    <div class="pill" style="background:#8A8A8E"></div>
    <div class="pill" style="background:#E85A5A"></div>
  </div>
  <h1>santaku</h1>
  <p class="ja">アプリで開いています…<br>開かないときは santaku アプリをインストールしてください。</p>
  <p class="en">Opening in the app…<br>If it doesn't open, please install the santaku app.</p>
  <a class="btn" id="store" href="#"><span class="ja">App Store で入手</span><span class="en">Get it on the App Store</span></a>
</div>
<script>
  (function(){
    var h=document.documentElement, n=(navigator.language||'ja').slice(0,2);
    h.setAttribute('data-lang', n==='ja'?'ja':'en');
    // アプリが入っていればカスタムスキームで起動を試みる。
    // u は単一の不透明な識別子（UUID）想定。形式を厳格検証＋エンコードしてインジェクションを防ぐ。
    try {
      var u=new URLSearchParams(location.search).get('u');
      if(u && /^[A-Za-z0-9_-]{1,64}$/.test(u)){ location.href='santaku://u/'+encodeURIComponent(u); }
    } catch(e){}
    // 国指定なし＝閲覧者の地域ストアへ自動転送
    var APP_STORE_URL='https://apps.apple.com/app/id6776507414';
    document.getElementById('store').href=APP_STORE_URL;
  })();
</script>
</body>
</html>
